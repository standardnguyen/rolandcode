name: Docker Build Test
on:
  push:
    branches: [dev]
    paths:
      - Dockerfile
      - .dockerignore
      - "packages/opencode/**"
      - "packages/script/**"
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - "packages/opencode/**"
      - "packages/script/**"

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rolandcode:test .

      - name: Verify binary runs
        run: docker run --rm rolandcode:test --version
