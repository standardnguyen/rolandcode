name: Verify Clean
on:
  push:
    branches: [main]
  pull_request:

jobs:
  static:
    name: Static + Mutation
    runs-on: docker
    container:
      image: node:20-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Run primary telemetry verification
        run: bash scripts/verify-clean.sh

      - name: Run static analysis suite
        run: bash tests/static/check-source.sh --no-color

      - name: Run mutation tests
        run: bash tests/mutation/check-mutations.sh --no-color

  unit-tests:
    name: Unit Tests
    runs-on: docker
    container:
      image: node:20-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: $HOME/.bun/bin/bun install

      - name: Run test suite
        run: |
          cd packages/opencode
          # Exclude permission tests (need non-root, see README "Known test issues")
          TEST_FILES=$(find test -name '*.test.ts' \
            ! -path '*/tool/write.test.ts' \
            ! -path '*/config/tui.test.ts' | sort)
          $HOME/.bun/bin/bun test --timeout 30000 $TEST_FILES 2>&1 | tee /tmp/test-output.log
          EXIT=$?
          # Allow flaky LLM stream tests (test isolation bug, not a code defect)
          if [ "$EXIT" -ne 0 ]; then
            REAL_FAILS=$(grep "^(fail)" /tmp/test-output.log | grep -cv "session.llm.stream" || true)
            if [ "$REAL_FAILS" -gt 0 ]; then
              echo "::error::$REAL_FAILS non-flaky test failures detected"
              exit 1
            fi
            echo "::warning::Only flaky LLM stream tests failed (test isolation issue)"
          fi

  build-and-verify:
    name: Build + Binary Forensics
    runs-on: docker
    container:
      image: node:20-bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install system tools
        run: apt-get update && apt-get install -y --no-install-recommends strace binutils

      - name: Install dependencies
        env:
          # Override Forgejo runner's GitHub redirect so bun can resolve
          # github: dependencies from the real GitHub API
          GITHUB_API_URL: https://api.github.com
          GITHUB_SERVER_URL: https://github.com
        run: |
          git config --global url."https://github.com/".insteadOf "https://github.com/"
          $HOME/.bun/bin/bun install

      - name: Build rolandcode
        env:
          MODELS_DEV_API_JSON: test/tool/fixtures/models-api.json
        run: cd packages/opencode && $HOME/.bun/bin/bun run build --single

      - name: Run dependency audit
        run: bash tests/deps/check-deps.sh --no-color

      - name: Run supply chain audit
        run: bash tests/supply-chain/check-supply-chain.sh --no-color

      - name: Run binary forensics
        run: bash tests/binary/check-binary.sh --no-color

      - name: Run behavioral tests
        run: bash tests/behavioral/check-behavior.sh --no-color

      - name: Run snapshot comparison
        run: bash tests/snapshots/compare-snapshot.sh --no-color
